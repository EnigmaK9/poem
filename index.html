<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Poems</title>
  <meta name="description" content="A collection of 2000 poems — procedural and classic — that change daily.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="#poem-display" class="skip-link">Skip to poem</a>

  <header class="site-header">
    <h1>Daily Poems</h1>
    <p id="date-label">Loading...</p>
  </header>

  <main class="container">
    <div id="poem-display" class="poem-display">
      <h2 id="poem-title" class="poem__title"></h2>
      <span id="poem-attribution" class="poem__attribution"></span>
      <div id="poem-body" class="poem__body"></div>
    </div>

    <div class="poem-controls">
      <span id="poem-counter" class="poem-counter"></span>
      <button id="lang-toggle" class="lang-btn">ES</button>
      <button id="next-poem" class="next-btn">Show another</button>
      <span class="next-hint">Arrow Right / Space / N &middot; T = translate</span>
    </div>
  </main>

  <footer class="site-footer">
    2000 poems &middot; new order each day
  </footer>

  <noscript>
    <p>This site requires JavaScript to display poems.</p>
  </noscript>

  <script src="js/poems.js"></script>
  <script src="js/famous.js"></script>
  <script src="js/rotation.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
